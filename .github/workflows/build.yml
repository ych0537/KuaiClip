name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build KuaiClip
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: bash scripts/test.sh

      - name: Build release
        run: swift build -c release

      - name: Package .app
        run: BUILD_DIR=.build/release VERSION="${GITHUB_REF_NAME#v}" bash scripts/package.sh

      - name: Verify .app exists
        run: |
          ls -la KuaiClip.app/Contents/MacOS/KuaiClip
          file KuaiClip.app/Contents/MacOS/KuaiClip

      - name: Create release zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp -R KuaiClip.app release/
          cd release
          zip -r KuaiClip.app.zip KuaiClip.app
          ls -lh KuaiClip.app.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KuaiClip-app
          path: KuaiClip.app

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/KuaiClip.app.zip
          generate_release_notes: true
