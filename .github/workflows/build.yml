name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build KuaiClip
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: bash scripts/test.sh

      - name: Build release
        run: swift build -c release

      - name: Package .app
        run: BUILD_DIR=.build/release VERSION="${GITHUB_REF_NAME#v}" bash scripts/package.sh

      - name: Verify .app exists
        run: |
          ls -la KuaiClip.app/Contents/MacOS/KuaiClip
          file KuaiClip.app/Contents/MacOS/KuaiClip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KuaiClip-unsigned-build
          path: KuaiClip.app
